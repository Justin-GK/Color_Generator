<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            transition: background-color 0.5s ease;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 10px;
        }

        #colorText {
            font-weight: bold;
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: block;
            color: #333;
        }

        button {
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
  </head>
  <body>
    <div class="card">
        <h2>Color Generator</h2>
        <span id="colorText">#FFFFFF</span>
        <button onclick="ubah()">Ubah Warna</button>
    </div>

    <script>
        function ubah() {
            var hexa = "0123456789ABCDEF";
            var warna = "#";
            
            for (var i = 0; i < 6; i++) {
                var idx = Math.floor(Math.random() * 16);
                warna += hexa[idx];
            }

            document.body.style.backgroundColor = warna;
            
            document.getElementById("colorText").innerText = warna;
        }
    </script>
  </body>
</html>
